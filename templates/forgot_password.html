<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GIF Gallery</title>
    <style>
        body {
            background-color: #2c2c2c; 
            display: flex;
            flex-direction: column; 
            justify-content: flex-start;
            align-items: center;
            gap: 30px; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
        }

        img {
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <img src="{{ url_for('static', filename='gif/1.gif') }}" alt="First GIF">
    <img src="{{ url_for('static', filename='gif/2.gif') }}" alt="Second GIF">
    <img src="{{ url_for('static', filename='gif/3.gif') }}" alt="Third GIF">

</body>
</html>
